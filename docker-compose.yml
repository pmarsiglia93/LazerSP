services:
  # ── API REST ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lazersp-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - db_data:/data          # SQLite persiste entre reinicializações
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_PATH: /data/lazersp.db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend Expo Web ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./LazerSP
      dockerfile: Dockerfile
    container_name: lazersp-frontend
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # A versão web roda no browser, que acessa o backend via localhost:3001
      # (a porta é exposta para o host pelo serviço backend acima)
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"

volumes:
  db_data:
    name: lazersp-db
